  <text x="452" y="706" fill="#A8C1DD" font-family="Courier New, monospace" font-size="20">Goal Tracking</text>
  <text x="452" y="746" fill="#FFD089" font-family="Courier New, monospace" font-size="28" font-weight="700">Macbook Air M4</text>

