  <text x="128" y="622" fill="#93AFCA" font-family="Arial, Helvetica, sans-serif" font-size="22">Track total money position and savings goals side by side.</text>
  <rect x="128" y="664" width="270" height="112" rx="18" fill="#123050"/>
