<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" rx="36" fill="#07111F"/>
  <rect x="56" y="56" width="1488" height="868" rx="30" fill="#0A1727" stroke="#233A58"/>

  <text x="96" y="126" fill="#ECF4FF" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700">Inside TuiTrack</text>
  <text x="96" y="168" fill="#8EA7C2" font-family="Arial, Helvetica, sans-serif" font-size="24">Five focused modules in one keyboard-first terminal workflow.</text>

  <rect x="96" y="220" width="428" height="260" rx="24" fill="#0E2439"/>
  <text x="128" y="272" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Expense Tracker</text>
  <text x="128" y="316" fill="#93AFCA" font-family="Arial, Helvetica, sans-serif" font-size="22">Log expense, saving, and earning flows.</text>
  <text x="128" y="358" fill="#58D5BC" font-family="Courier New, monospace" font-size="20">- category, amount, date</text>
  <text x="128" y="392" fill="#58D5BC" font-family="Courier New, monospace" font-size="20">- running totals and summaries</text>
  <text x="128" y="426" fill="#58D5BC" font-family="Courier New, monospace" font-size="20">- balance-aware financial view</text>

  <rect x="556" y="220" width="428" height="260" rx="24" fill="#10263B"/>
  <text x="588" y="272" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Work Tracker</text>
  <text x="588" y="316" fill="#93AFCA" font-family="Arial, Helvetica, sans-serif" font-size="22">Keep tasks visible without leaving the terminal.</text>
  <text x="588" y="358" fill="#59C5FF" font-family="Courier New, monospace" font-size="20">- create and update tasks</text>
  <text x="588" y="392" fill="#59C5FF" font-family="Courier New, monospace" font-size="20">- inspect progress from one screen</text>
  <text x="588" y="426" fill="#59C5FF" font-family="Courier New, monospace" font-size="20">- fits personal daily workflow</text>

  <rect x="1016" y="220" width="432" height="260" rx="24" fill="#112842"/>
  <text x="1048" y="272" fill="#F8FBFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700">Secret Notes</text>
  <text x="1048" y="316" fill="#93AFCA" font-family="Arial, Helvetica, sans-serif" font-size="22">Store local notes behind passkey-based protection.</text>
  <text x="1048" y="358" fill="#C6A7FF" font-family="Courier New, monospace" font-size="20">- encrypted note content</text>
  <text x="1048" y="392" fill="#C6A7FF" font-family="Courier New, monospace" font-size="20">- unlock only when needed</text>
  <text x="1048" y="426" fill="#C6A7FF" font-family="Courier New, monospace" font-size="20">- local-first private storage</text>

  <rect x="96" y="524" width="652" height="316" rx="24" fill="#0D2135"/>
